name: MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    steps:

    # 1. Code Checkout ✅
    - name: Code Checkout
      uses: actions/checkout@v3

    # 2. Dependency Installation ✅
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install dvc[s3] mlflow

    # AWS setup (needed for DVC)
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 3. DVC Data Pull ✅
    - name: DVC Data Pull
      run: dvc pull

    # 4 + 5. Model Training + MLflow Logging ✅
    - name: Train Model & Log to MLflow
      run: python src/train.py

    # 6. Metrics Generation (Explicit) ✅
    - name: Display Metrics
      run: |
        echo "Metrics generated:"
        cat metrics.json || echo "metrics.json not found"